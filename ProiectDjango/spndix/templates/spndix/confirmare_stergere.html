{% extends 'spndix/base.html' %}

{% block titlu %}Confirmare Ștergere{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmare Ștergere</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Ești sigur că vrei să ștergi:</p>
                <p class="fw-bold fs-4">{{ cheltuiala.titlu }}</p>
                <p class="text-danger fw-bold">{{ cheltuiala.suma }} RON</p>
                <form method="post" class="d-flex justify-content-center gap-3 mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Da, șterge
                    </button>
                    {% if back_url %}
                        <a href="{% url back_url %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Anulează
                        </a>
                    {% else %}
                        <a href="{% url 'lista_cheltuieli' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Anulează
                        </a>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
