{% extends 'AplicatiePractica/base.html' %}
{% block titlu %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Autentificare</h4>
            </div>
            <div class="card-body">
                {% if form.errors %}
                    <div class="alert alert-danger">Username sau parolă greșite.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Parolă</label>
                        <input type="password" name="password" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Nu ai cont? <a href="{% url 'register' %}">Înregistrează-te</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
